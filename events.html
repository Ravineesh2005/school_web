<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K P S Events</title>
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="homebtnstyle.css">
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
     <link rel="stylesheet" href="eventspagestyle.css">
</head>
<body>

  <div class="button-container">
        <a href="index.html" class="home-button">
            <div class="ripple"></div>
            <i class="fas fa-home home-icon"></i>
        </a>
    </div>


        <div class="logo" id="logo">
      <img
        src="assets/logo.png"
        alt="kps logo"
        class="logo-image1"
        id="logo-image1"
      />


    <header class="header">
        <div class="container">
            <h1>Welcome to K P S </h1>
            <p id="dynamic-quote">Loading  quote...</p>
        </div>
    </header>

    <section class="events-section">
        <div class="container">
            <h2>Upcoming Events</h2>
            <div class="events-container">
                <div class="event active">
                    <h3 id="event-title">Loading event...</h3>
                    <p id="event-description">Please wait while we load upcoming events.</p>
                    <p id="event-date"></p>
                </div>
                <div class="event-navigation">
                    <button id="prev-event"><i class="fas fa-chevron-left"></i></button>
                    <span id="event-counter">1/10</span>
                    <button id="next-event"><i class="fas fa-chevron-right"></i></button>
                </div>
            </div>
        </div>
    </section>

    <section class="gallery-section">
        <div class="container">
            <h2>School Gallery</h2>
            <div class="gallery-grid">
                <div class="gallery-item">
                    <img src="assets/events/pic1.jpg" alt="School Building">
                </div>
                <div class="gallery-item">
                    <img src="assets/events/pic2.jpg" alt="Classroom">
                </div>
                <div class="gallery-item">
                    <img src="assets/events/pic3.jpg" alt="Library">
                </div>
                <div class="gallery-item">
                    <img src="assets/events/pic4.jpg" alt="Sports Day">
                </div>
                <div class="gallery-item">
                    <img src="assets/events/pic5.jpg" alt="Science Fair">
                </div>
                <div class="gallery-item">
                    <img src="assets/events/pic6.jpg" alt="Art Exhibition">
                </div>
                <div class="gallery-item">
                    <img src="assets/events/pic7.jpg" alt="Graduation">
                </div>
            </div>
        </div>
    </section>

    <section class="achievements-section">
        <div class="container">
            <h2>Our Achievements</h2>
            <div class="achievements-grid">
                <div class="achievement-item">
                    <img src="assets/events/pic10.jpg" alt="Academic Award">
                    
                </div>
                <div class="achievement-item">
                    <img src="assets/events/pic8.jpg" alt="Sports Championship">
                
                </div>
                <div class="achievement-item">
                    <img src="assets/events/pic9.jpg" alt="Science Olympiad">
                    
                </div>
                <div class="achievement-item">
                    <img src="assets/events/pic10.jpg" alt="Debate Competition">
            
                </div>
                <div class="achievement-item">
                    <img src="assets/events/pic11.jpg" alt="Music Festival">
                    
                </div>
            </div>
        </div>
    </section>

    <section class="faculty-section">
        <div class="container">
            <h2>Our Faculty</h2>
            <div class="faculty-grid">
                <div class="faculty-item">
                    <img src="assets/events/pic18.jpg" alt="Principal">
                    <h3>Principal</h3>
                </div>
                <div class="faculty-item">
                    <img src="assets/events/pic12.jpg" alt="Math Teacher">
                    <!-- <h3>Mathematics Department</h3> -->
                </div>
                <div class="faculty-item">
                    <img src="assets/events/pic13.jpg" alt="Science Teacher">
                    <!-- <h3>Science Department</h3> -->
                </div>
                <div class="faculty-item">
                    <img src="assets/events/pic14.jpg" alt="Arts Teacher">
                    <!-- <h3>Arts Department</h3> -->
                </div>
                <div class="faculty-item">
                    <img src="assets/events/pic15.jpg" alt="Sports Coach">
                    <!-- <h3>Physical Education</h3> -->
                </div>
                <div class="faculty-item">
                    <img src="assets/events/pic16.jpg" alt="Language Teacher">
                    <!-- <h3>Languages Department</h3> -->
                </div>
                <div class="faculty-item">
                    <img src="assets/events/pic17.jpg" alt="Music Teacher">
                    <!-- <h3>Performing Arts</h3> -->
                </div>
            </div>
        </div>
    </section>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2023 K P S Intermediate Collage . All rights reserved.</p>
        </div>
    </footer>

<script src="eventspagescript.js"></script>
    
</body>
</html>
